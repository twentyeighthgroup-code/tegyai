<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tegy AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient-start: #ffe6f0;
            --bg-gradient-end: #ffccd5;
            --button-bg-start: #ff9999;
            --button-bg-end: #ff6666;
            --link-color: #ff9999;
            --border-color: #ff9999;
            --highlight-color: #ff6666;
            --shadow-color: rgba(255, 102, 102, 0.3);
        }
        body {
            font-family: 'Orbitron', 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            animation: galaxySpin 25s infinite linear;
        }
        .chat-container {
            max-width: 680px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            padding: 28px;
            border-radius: 24px;
            box-shadow: 0 20px 50px var(--shadow-color),
                        0 0 30px rgba(255, 102, 102, 0.6);
            text-align: center;
            transform: perspective(1000px) rotateY(8deg);
            transition: transform 0.4s ease;
        }
        .chat-container:hover { transform: perspective(1000px) rotateY(0deg); }
        .message {
            margin: 16px 0;
            padding: 18px 22px;
            border-radius: 18px;
            animation: floatIn 0.6s ease-out forwards;
            box-shadow: 0 6px 20px var(--shadow-color);
        }
        .user { background: linear-gradient(135deg, #007bff, #00c6ff); color: white; margin-left: 20%; border-bottom-right-radius: 4px; }
        .bot { background: linear-gradient(135deg, #fff0f0, #ffe6e6); color: #222; margin-right: 20%; border-bottom-left-radius: 4px; }
        .input-area {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            border: 3px solid var(--border-color);
            border-radius: 14px;
            font-size: 17px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-color: var(--highlight-color);
            box-shadow: 0 0 0 4px rgba(255,102,102,0.3);
        }
        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--button-bg-start), var(--button-bg-end));
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 18px var(--shadow-color);
        }
        button:hover {
            transform: scale(1.08) translateY(-2px);
            box-shadow: 0 10px 25px var(--shadow-color);
        }
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 50;
        }
        .footer {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--link-color);
            font-size: 13px;
            font-weight: 700;
            text-shadow: 0 0 12px var(--highlight-color);
            letter-spacing: 1px;
        }
        @keyframes galaxySpin { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        @keyframes floatIn {
            from { opacity: 0; transform: translateY(25px) rotate(3deg); }
            to { opacity: 1; transform: translateY(0) rotate(0); }
        }
        .chat-history {
            max-height: 520px;
            overflow-y: auto;
            padding-right: 8px;
        }
        .chat-history::-webkit-scrollbar { width: 6px; }
        .chat-history::-webkit-scrollbar-thumb {
            background: var(--highlight-color);
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="lang-switch">
        <button onclick="switchLanguage('ru')" id="btn-ru"
                class="px-6 py-2 text-sm font-bold rounded-2xl shadow-lg transition-all active:scale-95">🇷🇺 Русский</button>
        <button onclick="switchLanguage('en')" id="btn-en"
                class="px-6 py-2 text-sm font-bold rounded-2xl shadow-lg transition-all active:scale-95">🇬🇧 English</button>
    </div>

    <div class="chat-container">
        <h1 class="text-5xl font-bold mb-2 tracking-wider" style="color: var(--link-color); text-shadow: 0 0 20px var(--highlight-color);">
            Tegy AI
        </h1>
        <p id="welcome-text" class="text-lg mb-8 opacity-90"></p>

        
        <div id="chat-history" class="chat-history text-left mb-6"></div>

        
        <div class="input-area">
            <input type="text" id="question-input" placeholder="Задай мне вопрос..." 
                   onkeydown="if(event.keyCode===13) sendMessage()">
            <button onclick="sendMessage()" class="text-lg">Отправить</button>
        </div>

        <div class="flex gap-3 justify-center mt-6">
            <button onclick="tellJoke()" class="text-base px-8 py-3 flex-1">🤖 Рассказать шутку</button>
            <button onclick="clearChat()" class="text-base px-8 py-3 flex-1 bg-gray-200 text-gray-700 hover:bg-gray-300">🗑 Очистить чат</button>
        </div>

        <div class="text-xs text-gray-500 mt-8 flex items-center justify-center gap-2">
            <span>AI may be wrong</span>
            <span class="text-2xl">•</span>
            <span>Start Smart</span>
        </div>
    </div>

    <div class="footer">Made by <span style="color:#ff6666">Teg</span><span style="color:#ff9999">company</span></div>

    <script>
        
        const jokes = {
            ru: {
                programming: [
                    "Почему программист предпочитает тёмную тему? Потому что светлый режим напоминает ему о счёте за электричество!",
                    "Что сказал программист, когда его код не сработал? 'Я же говорил, что это фича, а не баг!'",
                    "Почему программисты предпочитают Python? Потому что он не заставляет их ставить точки с запятой!"
                ],
                science: [
                    "Почему атомы расстались? Потому что у них не было химии!",
                    "Что сказал физик, уронив бутерброд? 'Гравитация, ты опять!'",
                    "Почему учёные не доверяют атомам? Потому что они могут быть нестабильными!"
                ],
                general: [
                    "Почему компьютер не шутит? Потому что у него нет чувства юмора!",
                    "Почему скелет не пришёл на вечеринку? У него не было тела для танцев!",
                    "Что делает кот, когда ему скучно? Мурлычет в интернете!"
                ]
            },
            en: {
                programming: ["Why do programmers prefer dark mode? Because light attracts bugs!"],
                science: ["Why did the atoms break up? They lacked chemistry!"],
                general: ["Why don't computers tell jokes? Because they lack a sense of humor!"]
            }
        }

        const dialogue = {
            greetings: {
                ru: ["Привет! Рад тебя видеть с Tegy AI! 😄", "Здравствуй! Готов начать день с ИИ-помощником? 🌞", "Приветик! Рад тебя видеть в этом технологичном мире! 🚀"],
                en: ["Hello! Welcome with Tegy AI! 😄", "Hi there! Ready to kick off the day with an AI buddy? 🌞"]
            },
            howAreYou: {
                ru: ["Как твои дела сегодня? Расскажи! 😄", "Что у тебя на уме? Может, поделимся? 🌱"],
                en: ["How are you doing today? Tell me! 😄", "What’s on your mind? Let’s share! 🌱"]
            },
            encouragements: {
                ru: ["Ты крут! Всё возможно с твоей энергией! 💪", "Не сдавайся, друг! ИИ и ты — непобедимая команда! 🚀"],
                en: ["You’re awesome! Anything’s possible with your energy! 💪", "Don’t give up, friend!"]
            },
            farewells: {
                ru: ["Пока! Увидимся с новыми идеями! 😊", "До встречи! Пусть твой день будет крутым! 🚀"],
                en: ["Bye! See you with new ideas! 😊", "See you later! Have an awesome day! 🚀"]
            }
        }

        
        let knowledge = {
            technology: {
                "Как ИИ влияет на работу?": { answer: "ИИ автоматизирует рутинные задачи, вроде анализа данных или поддержки клиентов. Но многие профессии, например, творческие, всё ещё требуют человеческого подхода. Может, расскажешь, чем ты занимаешься?", lang: "ru" },
                "Стоит ли учить программирование с ИИ-инструментами?": { answer: "Да, это отличная идея! ИИ-инструменты вроде GitHub Copilot стали круче, но базовые знания всё равно нужны. Начни с Python и экспериментируй с ИИ!", lang: "ru" },
                "Что нового в гаджетах?": { answer: "Гаджеты стали умнее: складные смартфоны с ИИ-ассистентами и умные очки с AR — хит сезона.", lang: "ru" },
                "How is AI changing jobs?": { answer: "AI is automating routine tasks like data analysis or customer support. Yet, creative jobs still need a human touch.", lang: "en" },
            },
            ecology: {
                "Как бороться с изменением климата?": { answer: "Важно использовать возобновляемую энергию и сокращать пластик. Многие страны усиливают меры.", lang: "ru" },
                "Будет ли жара летом?": { answer: "Прогнозы говорят о жарком лете из-за глобального потепления.", lang: "ru" },
            },
            news: {
                "Что происходит в мире?": { answer: "Идут переговоры по климату и новым технологиям.", lang: "ru" },
            },
            entertainment: {
                "Какие фильмы выйдут?": { answer: "Ждут крутые премьеры: фантастика с Шарлиз Терон и триллеры.", lang: "ru" },
            },
            health: {
                "Как поддерживать здоровье?": { answer: "Тренд — здоровое питание и умные фитнес-браслеты.", lang: "ru" },
            },
            education: {
                "Как поступить в университет?": { answer: "Важны онлайн-заявления и высокие баллы ЕГЭ.", lang: "ru" },
            },
            sports: {
                "Какой спорт популярен?": { answer: "Тренд — виртуальные фитнесы и скалолазание.", lang: "ru" },
            }
        }

        
        let allQuestions = []
        let questionToData = {}

        function buildKnowledgeIndex() {
            allQuestions = []
            questionToData = {}
            Object.keys(knowledge).forEach(cat => {
                Object.keys(knowledge[cat]).forEach(q => {
                    const data = knowledge[cat][q]
                    const processed = preprocessText(q, data.lang)
                    allQuestions.push(processed)
                    questionToData[processed] = {
                        original: q,
                        answer: data.answer,
                        category: cat,
                        lang: data.lang
                    }
                })
            })
        }

        
        let tfidfVectorizer = {
            vocab: {},
            idf: {},
            fitTransform(docs) {
                
                const wordSet = new Set()
                docs.forEach(doc => doc.split(' ').forEach(w => wordSet.add(w)))
                this.vocab = Array.from(wordSet)

                
                const N = docs.length
                this.idf = {}
                this.vocab.forEach(word => {
                    const df = docs.filter(doc => doc.includes(word)).length
                    this.idf[word] = Math.log((N + 1) / (df + 1)) + 1
                })

                
                return docs.map(doc => {
                    const vec = new Array(this.vocab.length).fill(0)
                    const words = doc.split(' ')
                    words.forEach(w => {
                        const i = this.vocab.indexOf(w)
                        if (i !== -1) vec[i] = (words.filter(x => x === w).length / words.length) * this.idf[w]
                    })
                    return vec
                })
            }
        }

        let tfidfMatrix = []

        
        const ruStop = new Set(["и","в","на","с","по","для","от","из","о","а","но","не","это","что","как","так","то","же","бы","был","была","было","были","у","к","за","под","над","между","или","ли","либо","да","нет","даже","уже","ещё","ещё","только","очень","все","всех","всем","всеми","всё","всё","всё","всё"])
        const enStop = new Set(["the","a","an","and","or","but","if","while","for","of","to","in","on","at","by","with","about","against","between","into","through","during","before","after","above","below","up","down","from","than","then","when","where","why","how","all","any","both","each","few","more","most","other","some","such","no","nor","not","only","own","same","so","than","too","very","s","t","can","will","just","don","should","now"])

        function preprocessText(text, lang) {
            let t = text.toLowerCase()
                .replace(/[^\w\s]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim()
            const stop = lang === 'ru' ? ruStop : enStop
            let tokens = t.split(' ').filter(w => w && !stop.has(w))
            return tokens.join(' ')
        }

        function cosineSimilarity(a, b) {
            let dot = 0, normA = 0, normB = 0
            for (let i = 0; i < a.length; i++) {
                dot += a[i] * b[i]
                normA += a[i] * a[i]
                normB += b[i] * b[i]
            }
            if (normA === 0 || normB === 0) return 0
            return dot / (Math.sqrt(normA) * Math.sqrt(normB))
        }

        function detectLanguage(text) {
            const ruChars = (text.match(/[а-яё]/gi) || []).length
            return ruChars > text.length / 3 ? 'ru' : 'en'
        }

        function calculateExpression(expr) {
            try {
                
                const result = Function('"use strict";return (' + expr.replace(/[^0-9+\-*/(). ]/g, '') + ')')()
                const now = new Date().toLocaleString('ru-RU', { timeZone: 'Europe/Moscow', hour12: false })
                return `${expr} = ${result}\nТекущее время (МСК): ${now}`
            } catch(e) { return null }
        }

        
        function simpleAI(question) {
            const lang = window.currentLang || 'ru'

            
            const calc = calculateExpression(question)
            if (calc) return calc

            
            if (/привет|здравствуй|hi|hello/i.test(question)) {
                return dialogue.greetings[lang][Math.floor(Math.random()*dialogue.greetings[lang].length)]
            }

            const processed = preprocessText(question, lang)

            
            if (allQuestions.length === 0) buildKnowledgeIndex()
            if (tfidfMatrix.length === 0) {
                tfidfMatrix = tfidfVectorizer.fitTransform(allQuestions)
            }

            const qVec = tfidfVectorizer.fitTransform([processed])[0]

            let bestScore = -1
            let bestAnswer = null

            for (let i = 0; i < allQuestions.length; i++) {
                const score = cosineSimilarity(qVec, tfidfMatrix[i])
                if (score > bestScore && questionToData[allQuestions[i]].lang === lang) {
                    bestScore = score
                    bestAnswer = questionToData[allQuestions[i]].answer
                }
            }

            if (bestScore > 0.35 && bestAnswer) {
                return bestAnswer
            }

            
            if (/шутк|joke/i.test(question)) {
                return tellJoke(true)
            }

            
            const fallback = lang === 'ru'
                ? "Хм, интересный вопрос! Уточни, пожалуйста, я обязательно помогу 🔥"
                : "Hmm, interesting question! Could you clarify a bit? I'll definitely help 🔥"

            return dialogue.encouragements[lang][Math.floor(Math.random()*dialogue.encouragements[lang].length)] + "\n" + fallback
        }

        
        window.currentLang = 'ru'

        function switchLanguage(lang) {
            window.currentLang = lang
            document.getElementById('btn-ru').style.opacity = lang === 'ru' ? '1' : '0.6'
            document.getElementById('btn-en').style.opacity = lang === 'en' ? '1' : '0.6'
            document.getElementById('welcome-text').innerHTML = lang === 'ru'
                ? 'Привет! Я <strong>Tegy AI</strong>. Задавай любые вопросы — я всегда на связи! 🚀'
                : 'Hello! I am <strong>Tegy AI</strong>. Ask me anything — I’m always online! 🚀'
            renderChat()
        }

        function renderChat() {
            const container = document.getElementById('chat-history')
            container.innerHTML = ''
            const history = JSON.parse(localStorage.getItem('tegyChat') || '[]')
            history.forEach(msg => {
                const div = document.createElement('div')
                div.className = `message ${msg.role}`
                div.innerHTML = msg.content
                container.appendChild(div)
            })
            container.scrollTop = container.scrollHeight
        }

        function addMessage(role, content) {
            let history = JSON.parse(localStorage.getItem('tegyChat') || '[]')
            history.push({ role, content })
            if (history.length > 50) history = history.slice(-50)
            localStorage.setItem('tegyChat', JSON.stringify(history))
            renderChat()
        }

        function sendMessage() {
            const input = document.getElementById('question-input')
            const q = input.value.trim()
            if (!q) return

            addMessage('user', q)
            input.value = ''

            
            setTimeout(() => {
                const answer = simpleAI(q)
                addMessage('bot', answer)
            }, 420)
        }

        function tellJoke(returnOnly = false) {
            const lang = window.currentLang
            const cat = Math.random() > 0.6 ? 'programming' : (Math.random() > 0.5 ? 'science' : 'general')
            const jokeList = jokes[lang][cat] || jokes[lang].general
            const joke = jokeList[Math.floor(Math.random() * jokeList.length)]

            if (returnOnly) return joke

            addMessage('bot', joke)
        }

        function clearChat() {
            if (confirm('Очистить весь чат?')) {
                localStorage.removeItem('tegyChat')
                renderChat()
            }
        }

        
        window.onload = () => {
            buildKnowledgeIndex()
            tfidfMatrix = tfidfVectorizer.fitTransform(allQuestions)

            
            const history = JSON.parse(localStorage.getItem('tegyChat') || '[]')
            if (history.length === 0) {
                const lang = window.currentLang
                addMessage('bot', dialogue.greetings[lang][0] + '\n' + dialogue.howAreYou[lang][0])
            } else {
                renderChat()
            }

            document.getElementById('welcome-text').innerHTML = 
                'Привет! Я <strong>Tegy AI</strong>. Задавай любые вопросы — я всегда на связи! 🚀'

            console.log('%c✅ Tegy AI done!', 'color:#ff6666; font-size:18px; font-weight:bold')
        }
    </script>
</body>
</html>
